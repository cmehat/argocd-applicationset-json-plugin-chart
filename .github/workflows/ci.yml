name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: helm lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: helm lint (strict)
        run: helm lint --strict .

      - name: Render all chart modes
        run: |
          set -euo pipefail
          mkdir -p .render
          for mode in jsonpath jq dual; do
            echo "::group::helm template plugin.mode=$mode"
            helm template ci . \
              --namespace argocd \
              --set plugin.mode=$mode \
              --set image.tag=$mode-1.0.0 \
              > .render/$mode.yaml
            echo "::endgroup::"
          done

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests with kubeconform
        run: |
          kubeconform -strict -summary -kubernetes-version 1.30.0 \
            .render/jsonpath.yaml .render/jq.yaml .render/dual.yaml

      - name: Validate ApplicationSet examples are valid YAML
        run: |
          set -euo pipefail
          for f in examples/applicationset-*.yaml; do
            echo "checking $f"
            python -c "import yaml,sys; list(yaml.safe_load_all(open(sys.argv[1])))" "$f"
          done

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on example scripts
        run: shellcheck examples/*.sh
